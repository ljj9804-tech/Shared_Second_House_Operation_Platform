<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게스트 채팅방 웹소켓 테스트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 320px; overflow-y: scroll; padding: 10px; background: #f9f9f9; margin-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
        label { display: inline-block; width: 100px; }
        .msg-item { margin: 5px 0; padding: 5px; border-bottom: 1px dashed #eee; }
        .btn-sm { margin-left: 5px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>
<h2>🚀 게스트 채팅 실시간 테스트 룸 (v2)</h2>

<div class="input-group">
    <button onclick="connect()">🔌 1. 서버 연결 및 1번방 구독</button>
    <span id="status" style="color: red; font-weight: bold; margin-left: 10px;">연결 끊김</span>
</div>

<hr>

<div id="messages"></div>

<div class="input-group">
    <label>보낸이 이름:</label>
    <input type="text" id="senderName" value="플러터게스트">
</div>
<div class="input-group">
    <label>메시지 내용:</label>
    <input type="text" id="messageContent" style="width: 300px;" value="안녕하세요! 실시간 웹소켓 대화 테스트입니다.">
    <button onclick="sendMessage()">📤 전송</button>
</div>

<script>
    let stompClient = null;
    const roomId = 1; // 테스트할 방 번호
    const currentUserId = 1; // 🟩 질문하신 User 테이블의 실제 존재하는 PK 1번 매핑 유지!

    function connect() {
        const socket = new WebSocket('ws://localhost:8080/ws-guest-chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function (frame) {
            document.getElementById('status').innerText = "✅ 연결 및 구독 성공!";
            document.getElementById('status').style.color = "green";
            console.log('Connected: ' + frame);

            // /topic/guest/room/1 채널 구독 시작
            stompClient.subscribe('/topic/guest/room/' + roomId, function (response) {
                const msg = JSON.parse(response.body);
                showOutput(msg);
            });
        }, function(error) {
            alert('웹소켓 연결 실패: ' + error);
        });
    }

    // [1] 일반 메시지 전송 (TALK)
    function sendMessage() {
        if(!stompClient) {
            alert('먼저 서버 연결 버튼을 눌러주세요!');
            return;
        }

        const senderName = document.getElementById('senderName').value;
        const content = document.getElementById('messageContent').value;

        const chatDto = {
            type: "TALK", // ✨ 추가된 타입 식별자
            chatRoomId: roomId,
            senderId: currentUserId, // 1번 유저 바인딩
            senderName: senderName,
            content: content
        };

        stompClient.send("/app/guest/chat/send", {}, JSON.stringify(chatDto));
        document.getElementById('messageContent').value = ''; // 발신 후 인풋 초기화
    }

    // ✨ [2] 메시지 실시간 수정 요청 (EDIT)
    function requestEdit(chatId) {
        const newContent = prompt("수정할 내용을 입력하세요:");
        if (!newContent) return;

        const editDto = {
            type: "EDIT",
            chatId: chatId,
            chatRoomId: roomId,
            content: newContent
        };

        stompClient.send("/app/guest/chat/edit", {}, JSON.stringify(editDto));
    }

    // ✨ [3] 메시지 실시간 삭제 요청 (DELETE)
    function requestDelete(chatId) {
        if (!confirm("정말 이 메시지를 삭제하시겠습니까?")) return;

        const deleteDto = {
            type: "DELETE",
            chatId: chatId,
            chatRoomId: roomId
        };

        stompClient.send("/app/guest/chat/delete", {}, JSON.stringify(deleteDto));
    }

    // 🖥️ 수신된 데이터 분기 처리 및 화면 렌더링
    function showOutput(message) {
        const messagesDiv = document.getElementById('messages');

        if (message.type === 'TALK') {
            // 일반 대화 수신 시 태그 내부에 고유 ID(chatId)를 심어서 동적으로 추가합니다.
            messagesDiv.innerHTML += `
                <div class="msg-item" id="msg-${message.chatId}">
                    <strong>[${message.senderName}]:</strong>
                    <span class="txt-content">${message.content}</span>
                    <button class="btn-sm" onclick="requestEdit(${message.chatId})">📝 수정</button>
                    <button class="btn-sm" onclick="requestDelete(${message.chatId})">🗑️ 삭제</button>
                </div>`;
        }
        else if (message.type === 'EDIT') {
            // 수정 신호 수신 시 해당 chatId를 가진 DOM을 찾아 텍스트만 실시간 교체!
            const targetMsg = document.getElementById(`msg-${message.chatId}`);
            if (targetMsg) {
                targetMsg.querySelector('.txt-content').innerText = message.content + " (수정됨)";
                targetMsg.querySelector('.txt-content').style.color = "blue";
            }
        }
        else if (message.type === 'DELETE') {
            // 삭제 신호 수신 시 해당 chatId를 가진 엘리먼트를 화면에서 즉시 소멸!
            const targetMsg = document.getElementById(`msg-${message.chatId}`);
            if (targetMsg) {
                targetMsg.remove();
            }
        }

        messagesDiv.scrollTop = messagesDiv.scrollHeight; // 스크롤 최하단 이동
    }
</script>
</body>
</html>

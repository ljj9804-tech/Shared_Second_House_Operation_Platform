spring.application.name=Spring_Back

# ==========================================
# 1. MariaDB 데이터베이스 연결 설정
# ==========================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/webdb
spring.datasource.username=webuser
spring.datasource.password=webuser

# ==========================================
# 2. 로그 레벨 (Logging) 설정
# 시스템은 info 등급, 우리가 사용하는 패키지는 debug 모드로 설정
# ==========================================
logging.level.org.springframework=info
logging.level.org.springframework.security=debug
# [교정 완료] 패키지명 대소문자 일치 (i -> I)
logging.level.com.busanIt401=debug

# ==========================================
# 3. 개발 도구 설정
# ==========================================
# 자동 재시작 기능 끄기 (파일 수정 시 서버 재기동 방지)
spring.devtools.restart.enabled=false

# ==========================================
# 4. Spring Data JPA 설정
# ==========================================
# 개발 단계: 데이터베이스에 변경이 있을 경우만 업데이트 반영
spring.jpa.hibernate.ddl-auto=update

# 로깅 콘솔 출력 시 SQL 문장을 예쁘게 포맷팅
spring.jpa.properties.hibernate.format_sql=true

# SQL 문장을 콘솔에 구체적으로 출력
spring.jpa.show-sql=true

# ==========================================
# 5. 보안 및 외부 API 설정
# ==========================================
# JWT 비밀키
# JWT 비밀키 및 만료 시간 설정
# 자바 코드의 @Value("${jwt.secret}")와 일치하도록 경로를 수정했습니다.
jwt.secret=busainit401234567890busainit401234567890busainit401234567890

# 자바 코드의 @Value("${jwt.expiration}")에 주입될 토큰 만료 시간 (예: 1시간 = 3600000 밀리초)
jwt.expiration=3600000

# 자바 코드의 @Value("${jwt.refreshExpiration}")에 주입될 리프레시 토큰 만료 시간 (예: 7일 = 604800000 밀리초)
jwt.refreshExpiration=604800000

# Redis 및 Redisson 연결 설정
spring.data.redis.host=localhost
spring.data.redis.port=6379

# OAuth2 설정 추가
# 임시 구글 OAuth2 설정 (서버 부팅용 가짜 데이터)
spring.security.oauth2.client.registration.google.client-id=mock-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email


# 공공데이터 API 키 (필요 시 아래에 추가)
# public.api.serviceKey=key
# public.api.serviceKey=key


debug=true
# ==========================================
# 1. 기본 서버 및 애플리케이션 설정
# ==========================================
server.port=8080
spring.application.name=Spring_Back
debug=true

# ==========================================
# 2. MySQL 및 JPA/Hibernate 설정
# ==========================================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/webdb
spring.datasource.username=webuser
spring.datasource.password=webuser

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 3. 로그 레벨 (Logging) 및 개발 도구
# ==========================================
logging.level.org.springframework=info
logging.level.org.springframework.security=debug
logging.level.com.busanIt401=debug

spring.devtools.restart.enabled=false

# ==========================================
# 4. Redis / Elasticsearch
# ==========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.elasticsearch.uris=http://localhost:9200

# ==========================================
# 5. JWT
# ==========================================
jwt.secret=busainit401234567890busainit401234567890busainit401234567890
jwt.expiration=3600000
jwt.refreshExpiration=604800000

# ==========================================
# 6. OAuth2
# ==========================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.scope=name,email

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# ==========================================
# 7. Swagger
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.api-docs.path=/v3/api-docs

# ==========================================
# 8. Secret 파일
# ==========================================
spring.config.import=optional:classpath:application-secret.properties,\
optional:file:./src/main/resources/application-secret.properties,\
optional:file:application-secret.properties


name: flutter_front
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter


  # --------------------------------------------------------------
  # External Libraries (라이브러리 추가 시 알파벳 순으로 정렬하세요)
  # --------------------------------------------------------------
  cupertino_icons: ^1.0.8 # iOS 스타일(아이폰)의 기본 아이콘 팩
  cookie_jar: ^4.0.8                 # 쿠키 저장/관리
  dio_cookie_manager: ^3.1.1          # dio + cookie_jar 연결 인터셉터
  flutter_secure_storage: ^10.3.1     # access token 저장 (Keychain/Keystore)
  path_provider: ^2.1.4               # PersistCookieJar 저장 경로
  path: ^1.9.0
  dio: ^5.4.3
  go_router: ^14.6.2            # 라우팅 + 로그인 가드(redirect)
  google_maps_flutter: ^2.6.0 # 구글 지도 위젯 (맛집 지도 화면)
  google_sign_in: ^6.2.1         # 구글 소셜 로그인
  http: ^1.2.0 # REST API(HTTP)호출 라이브러리
  intl: ^0.19.0 #날짜, 시간, 숫자, 통화 표기법 자동으로 변환(날짜 및 시간 포맷팅에 사용예정)
  provider: ^6.1.2 # 상태관리 (챗봇/지도 화면, 인증 상태도 동일하게 사용)
  stomp_dart_client: ^3.0.1 # STOMP 웹소켓 통신을 위한 플러터 최적화 라이브러리
  url_launcher: ^6.2.6 # 외부 URL/지도 앱 실행
  flutter_dotenv: ^5.2.1        # .env 환경변수 관리
  kakao_map_plugin: ^0.4.0      # 카카오맵
  table_calendar: ^3.1.2        # 예약 캘린더
  google_fonts: ^6.2.1
  uuid: ^4.5.1

  geolocator: ^13.0.1           # 위치 스트림 (이동경로 추적)
  flutter_foreground_task: ^8.10.0 # 상시 알림 포그라운드 서비스 (백그라운드 위치 수집)

dev_dependencies:
  # [개발용 의존성] 테스트를 위한 라이브러리
  flutter_test:
    sdk: flutter

  # [개발용 의존성] 코드 스타일 가이드 및 문법 검사(Lint) 도구
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true # 안드로이드 머티리얼 디자인 아이콘 사용 활성화

  # --------------------------------------------------------------
  # Assets & Fonts (추후 필요할 때 주석을 풀고 사용하세요)
  # --------------------------------------------------------------
  assets:
    - .env
  #   - assets/images/
  #   - assets/icons/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700